name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install kernel headers
      run: sudo apt-get update && sudo apt-get install -y linux-headers-$(uname -r)
    - name: Build kernel module
      run: make -j$(nproc)
